<!doctype html>
<html>
<head>
    <title>Lyrion Script Runner</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="runner-card">
        <h2>&#128640; Running script...</h2>
        <p>La commande est en cours d’exécution. Cette fenêtre se fermera automatiquement une fois terminé.</p>
        <div id="status" class="status">En cours...</div>
    </div>

    <script>
        const statusEl = document.getElementById('status');

        fetch('/run-script?token={{ token }}')
            .then(() => {
                statusEl.textContent = 'Terminé';
                setTimeout(() => window.close(), 800);
            })
            .catch(() => {
                statusEl.textContent = 'Erreur';
                statusEl.classList.add('error');
            });
    </script>
</body>
</html>
