services:
  lyrion-app:
    image: python:3.12-slim
    container_name: lyrion-app
    restart: unless-stopped
    working_dir: /app
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt && gunicorn -w 1 --threads 4 -b 0.0.0.0:1111 app:app --access-logfile - --error-logfile - --log-level info"
    ports:
      - "1111:1111"
    environment:
      - LYRION_HOST=${LYRION_HOST}
      - DB_DIR=${DB_DIR}
      - DB_PERSIST_DIR=${DB_PERSIST_DIR}
      - SECRET_KEY=${SECRET_KEY:-supersecretkey}
      - CUSTOM_DATA_DIR=${CUSTOM_DATA_DIR:-/opt/scripts/custom_data}
      - LYRICS_PROVIDERS=${LYRICS_PROVIDERS:-lrclib,musixmatch,genius}
      - MUSIXMATCH_TOKEN=${MUSIXMATCH_TOKEN:-}
      - DEV=${DEV:-}
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import os, urllib.request as u; u.urlopen(f\"http://127.0.0.1:1111/health\")'"
      ]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - .:/app:ro
      - ${DB_DIR}:${DB_DIR}:ro
      - ${DB_PERSIST_DIR}:${DB_PERSIST_DIR}:ro
      - ${CUSTOM_DATA_DIR}:/opt/scripts/custom_data
